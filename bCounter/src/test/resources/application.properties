# Test overrides — applied on top of src/main/resources/application.properties
# during @SpringBootTest runs.  Uses temp-dir paths so tests never touch
# the real pbss_data tree and don't require it to exist.

# ── Data directories (temp, isolated per test run) ────────────────────────────
data.dir=${java.io.tmpdir}/bCounter-test
data.database.dir=${data.dir}/db
data.reports.dir=${data.dir}/reports
data.writeins.dir=${data.dir}/writeins
data.scribbles.dir=${data.dir}/scribbles
data.ballots.dir=${data.dir}/ballots

# ── Database (in-memory SQLite so no file creation is needed) ─────────────────
spring.datasource.url=jdbc:sqlite::memory:?cache=shared
spring.jpa.hibernate.ddl-auto=create-drop

# ── Reports ───────────────────────────────────────────────────────────────────
reports.output.dir=${data.reports.dir}

# ── Scribble detection off in tests ───────────────────────────────────────────
scanner.scribble-detection=false
scanner.scribble-outline-dir=${data.scribbles.dir}

# ── Suppress noisy startup logging in tests ───────────────────────────────────
logging.level.root=WARN
logging.level.com.mjtrac=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
