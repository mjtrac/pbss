spring.application.name=bCounter
server.port=8081
spring.thymeleaf.cache=false
server.servlet.session.timeout=3600

# ── Database (SQLite by default; switch to postgres via application-postgres.properties) ──
spring.datasource.url=jdbc:sqlite:${user.home}/pbss_data/db/counter_results.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.open-in-view=false

# Distinct session cookie so multiple apps can run in the same browser
server.servlet.session.cookie.name=BCOUNTER_SESSION

# ── Corner detection testing ──────────────────────────────────────────────────
# Set to true to skip primary corner mark detection and go straight to the
# bottom-edge rotation fallback. Useful for testing the fallback in isolation.
# Remove or set to false for normal production use.
#corner.detection.force-bottom-edge-fallback=true
corner.detection.force-bottom-edge-fallback=false

# ── Scanning safety limit ─────────────────────────────────────────────────────
# Stop scanning automatically after this many ballots are sent to manual review.
# Prevents a systematic problem (wrong YAML, bad images) from silently skipping
# large numbers of ballots. Set to 0 to disable the limit.
# Set to 0 to disable (recommended for test harness); use e.g. 50 for production
scanner.max-review-before-stop=20

# Number of ballot images to scan in parallel.
# 0 = auto (half of available CPU cores). 1 = sequential (for debugging).
scanner.parallel-threads=0

# ── Indicator layout format ───────────────────────────────────────────────────
# Which ballot layout file format bCounter expects to find alongside the PDF.
# Options: yaml (default), xml
# If yaml is specified but no .yaml file exists, falls back to .xml (and vice versa).
ballot.layout.format=yaml

# ── Logging to file ───────────────────────────────────────────────────────────
# All stdout logging is also written to this file.
logging.file.name=${user.home}/pbss_data/logs/bCounter.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %-5level %logger{36} : %msg%n

# ── App background color (any CSS color value) ────────────────────────────────
#app.background-color=

# ── Data directories ────────────────────────────────────────────────────────
# All persistent bCounter data lives under pbss_data in the user home.
data.dir=${user.home}/pbss_data
data.db.dir=${data.dir}/db
data.ballot.templates.dir=${data.dir}/ballot_templates
data.scans.dir=${data.dir}/cast_ballot_scans
# Default source folder for ballot images — pre-populated in the scan form
scanner.default.image.dir=${data.scans.dir}
# Default ballot layout (YAML) folder — points to bBuilder output by default
scanner.default.report.dir=${data.ballot.templates.dir}
data.reports.dir=${data.dir}/reports
data.writeins.dir=${data.dir}/writeins
data.scribbles.dir=${data.dir}/scribbles
reports.output.dir=${data.reports.dir}

# How often (in images scanned) to write results_report.html during a scan.
# Also written at the end of every scan regardless.
reports.interval=500

# ── bViewer (runs on viewer.server.port in the same process as bCounter) ──────
# Shares CounterUser accounts with the counter side — see the VIEWER role.
# Default seeded admin: admin / ChangeMe123! (change via /account/password).
viewer.server.port=8082

# ── Login page customisation ──────────────────────────────────────────────────
app.login-title=pbss Ballot Counter
app.login-logo=
app.viewer-login-title=pbss Ballot Viewer
app.viewer-login-logo=

# Use per-indicator patch warping instead of full-image warp (not faster in testing)
scanner.patch-warp=false

# Flag ink outside indicator zones (margin notes, arrows, etc.) via inter-ballot
# comparison; see ScribbleDetectionService for the algorithm.
scanner.scribble-detection=true

# Padding around each indicator's bounding box (inches) that's exempt from
# scribble detection, so a slightly-overflowing fill isn't flagged as stray ink.
scanner.scribble-indicator-pad-in=0.1

# Scribble outline images live alongside writeins/ as a sibling of reports/,
# not nested inside it.
scanner.scribble-outline-dir=${data.scribbles.dir}

logging.level.com.mjtrac.counter.service.CornerDetectionService=DEBUG
