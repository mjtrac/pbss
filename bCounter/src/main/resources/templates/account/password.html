<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Change Password — Election Counter</title>
  <link rel="stylesheet" th:href="@{/css/counter.css}"/>
</head>
<body>
<header class="app-header">
  <div class="tally-mark" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span class="slash"></span>
  </div>
  <h1>Election Counter</h1>
  <div class="header-user" sec:authorize="isAuthenticated()">
    <span sec:authentication="name">user</span>
    <form method="post" action="/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn">Sign Out</button>
    </form>
  </div>
</header>

<div class="app-body">
  <main class="main" style="max-width:480px">
    <h2>Change Password</h2>
    <p><a th:href="@{/}">&#8592; Back</a></p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form method="post" th:action="@{/account/password}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <label for="currentPassword">Current Password</label>
      <input type="password" id="currentPassword" name="currentPassword"
             required autocomplete="current-password"/>

      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" name="newPassword"
             required minlength="8" autocomplete="new-password"/>

      <label for="confirmPassword">Confirm New Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword"
             required minlength="8" autocomplete="new-password"/>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Change Password</button>
      </div>
    </form>
  </main>
</div>
</body>
</html>
