<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>New User — Election Counter</title>
  <link rel="stylesheet" th:href="@{/css/counter.css}"/>
</head>
<body>
<header class="app-header">
  <div class="tally-mark" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span class="slash"></span>
  </div>
  <h1>Election Counter</h1>
  <div class="header-user" sec:authorize="isAuthenticated()">
    <span sec:authentication="name">user</span>
    <form method="post" action="/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn">Sign Out</button>
    </form>
  </div>
</header>

<div class="app-body">
  <main class="main" style="max-width:480px">
    <h2>Create New User</h2>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form method="post" th:action="@{/admin/users}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <label for="username">Username *</label>
      <input type="text" id="username" name="username" required autocomplete="off" autofocus
             placeholder="e.g. jsmith"/>

      <label for="password">Password *</label>
      <input type="password" id="password" name="password" required
             autocomplete="new-password" minlength="12"/>
      <p class="field-hint" style="margin-bottom:.85rem">Minimum 12 characters.</p>

      <fieldset style="border:1px solid var(--border);border-radius:var(--radius);
                        padding:.75rem 1rem;margin-bottom:1rem">
        <legend style="font-weight:600;padding:0 .4rem">Roles * (select at least one)</legend>
        <div th:each="r : ${roles}" style="margin-bottom:.4rem">
          <label style="font-weight:normal;display:inline-flex;align-items:center;gap:.4rem">
            <input type="checkbox" th:value="${r}" name="roles"/>
            <strong th:text="${r}"></strong>
            <span th:switch="${r.name()}" style="color:var(--muted);font-size:.85rem">
              <span th:case="'ADMIN'"> — manage users and roles; full counter and viewer access</span>
              <span th:case="'COUNTER_OPERATOR'" th:text="' — configure, start, and stop counting (port ' + ${counterPort} + ')'"></span>
              <span th:case="'VIEWER'" th:text="' — review scanned ballot images (port ' + ${viewerPort} + ')'"></span>
            </span>
          </label>
        </div>
      </fieldset>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Create User</button>
        <a th:href="@{/admin}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </main>
</div>
</body>
</html>
