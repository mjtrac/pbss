<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Change Password — Ballot Viewer</title>
  <link rel="stylesheet" th:href="@{/css/viewer.css}"/>
</head>
<body>
<header class="app-header">
  <h1>&#128196; Ballot Viewer</h1>
  <span class="subtitle">Change Password</span>
  <div class="header-user" sec:authorize="isAuthenticated()">
    <a th:href="@{/viewer/}" style="color:white; margin-right:1rem; font-size:.9rem;">&#8592; Back</a>
    <span sec:authentication="name"></span>
    <form method="post" action="/viewer/logout" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="logout-btn">Sign Out</button>
    </form>
  </div>
</header>

<div class="login-wrap">
  <div class="login-card">
    <h1>Change Password</h1>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert-success" th:text="${success}"></div>

    <form method="post" th:action="@{/viewer/account/password}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <label for="currentPassword">Current Password</label>
      <input type="password" id="currentPassword" name="currentPassword"
             required autocomplete="current-password"/>

      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" name="newPassword"
             required minlength="8" autocomplete="new-password"/>

      <label for="confirmPassword">Confirm New Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword"
             required minlength="8" autocomplete="new-password"/>

      <button type="submit" class="login-btn">Change Password</button>
    </form>
  </div>
</div>
</body>
</html>
