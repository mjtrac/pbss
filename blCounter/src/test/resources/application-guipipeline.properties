# Activated by CountingPipelineGuiTest via .profiles("guipipeline").
# Profile-specific files override the base application.properties (also in
# src/test/resources), which is otherwise needed for every other test here —
# this is why plain SpringApplicationBuilder.properties(...) overrides don't
# work: those are Spring Boot's lowest-precedence "default properties" and
# lose to any application*.properties file, including this directory's own
# base one. gui.pipeline.resultsDir is supplied by the test itself via
# .properties(...) — safe there since nothing else defines that key.

spring.datasource.url=jdbc:sqlite:${gui.pipeline.resultsDir}/counter_results.db
spring.jpa.hibernate.ddl-auto=update
reports.output.dir=${gui.pipeline.resultsDir}
scanner.scribble-outline-dir=${gui.pipeline.resultsDir}/scribbles
scanner.max-review-before-stop=0
