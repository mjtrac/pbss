<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${loginTitle}">bScanner</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; display: flex;
           justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: white; padding: 2rem 2.5rem; border-radius: 8px;
           box-shadow: 0 2px 8px rgba(0,0,0,.15); min-width: 320px; }
    h2 { margin-top: 0; color: #1a1a2e; }
    input { width: 100%; padding: .5rem; margin: .4rem 0 1rem;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: .6rem; background: #1a1a2e; color: white;
             border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .msg { padding: .5rem; border-radius: 4px; margin-bottom: 1rem; }
    .err { background: #ffe0e0; color: #c00; }
    .ok  { background: #e0ffe0; color: #060; }
  </style>
</head>
<body>
<div class="box">
  <h2 th:text="${loginTitle}">bScanner</h2>
  <div th:if="${error}"  class="msg err" th:text="${error}"></div>
  <div th:if="${logout}" class="msg ok"  th:text="${logout}"></div>
  <form method="post" action="/login">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label>Username</label>
    <input type="text" name="username" autofocus required/>
    <label>Password</label>
    <input type="password" name="password" required/>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
