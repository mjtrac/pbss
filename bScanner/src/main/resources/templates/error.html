<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Page Not Found — bScanner</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; display: flex;
           justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: white; padding: 2rem 2.5rem; border-radius: 8px;
           box-shadow: 0 2px 8px rgba(0,0,0,.15); min-width: 320px; max-width: 480px; }
    h2 { margin-top: 0; color: #1a1a2e; }
    code { background: #f4f4f4; padding: .15rem .4rem; border-radius: 3px; }
    a.btn { display: inline-block; margin-top: 1rem; padding: .6rem 1rem;
            background: #1a1a2e; color: white; border-radius: 4px;
            text-decoration: none; font-size: .95rem; }
  </style>
</head>
<body>
<div class="box">
  <h2 th:text="(${status} ?: '') + ' — ' + (${error} ?: 'Error')">Error</h2>
  <p>The page you're looking for doesn't exist — double-check the URL.</p>
  <p style="color:#666;font-size:.85rem">
    Requested: <code th:text="${path}"></code>
  </p>
  <a th:href="@{/}" class="btn">bScanner Home</a>
</div>
</body>
</html>
