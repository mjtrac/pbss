server.port=8083
spring.application.name=bScanner

# ── SQLite database ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:scanner.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=1

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Scanner configuration ─────────────────────────────────────────────────────
# Backend: naps2 | scanimage | command
scanner.backend=naps2
scanner.naps2.path=/Applications/NAPS2.app/Contents/MacOS/naps2
scanner.scanimage.path=/usr/bin/scanimage
# Custom command: use {output} as placeholder for output path/prefix
scanner.custom.command=
scanner.naps2.profile=
scanner.naps2.device=

scanner.output.dir=${user.home}/bSuite/test-harness/images/scanned
scanner.dpi=300
scanner.duplex=true
# source: feeder | glass
scanner.source=duplex
# output filename prefix (timestamp appended automatically)
scanner.filename.prefix=ballot_scan_

# ── App branding ──────────────────────────────────────────────────────────────
app.login-title=bScanner - Election Ballot Scanner
