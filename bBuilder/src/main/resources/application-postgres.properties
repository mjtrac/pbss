# PostgreSQL profile — set DB_USER and DB_PASS environment variables before starting
spring.datasource.url=jdbc:postgresql://localhost:5432/election_ballot
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' in production with Flyway managing schema migrations
spring.jpa.hibernate.ddl-auto=validate
