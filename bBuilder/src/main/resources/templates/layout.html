<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} + ' — bSuite Ballot Builder'">bSuite Ballot Builder</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body th:style="${appBgColor != null && !appBgColor.isEmpty()} ? 'background-color:' + ${appBgColor} : ''">
<nav th:fragment="nav">
  <div class="nav-brand"><a th:href="@{/dashboard}">bSuite Ballot Builder</a></div>
  <div class="nav-links">

    <span class="nav-group" sec:authorize="hasAnyRole('ADMIN','DATA_ENTRY')">
      <span class="nav-label">Setup</span>
      <a th:href="@{/setup/simple-election/new}" style="font-weight:600">⚡ Quick Setup</a>
      <a th:href="@{/data/elections}">Elections</a>
      <a th:href="@{/data/regions}">Regions</a>
      <a th:href="@{/data/parties}">Parties</a>
      <a th:href="@{/data/ballot-types}">Ballot Types</a>
      <a th:href="@{/data/contests}">Contests</a>
      <a th:href="@{/data/languages}">Languages</a>
    </span>

    <span class="nav-group">
      <span class="nav-label" sec:authorize="hasAnyRole('ADMIN','DATA_ENTRY')">Ballots</span>
      <a th:href="@{/data/ballot-combinations}"
         sec:authorize="hasAnyRole('ADMIN','DATA_ENTRY')">Combinations</a>
      <a th:href="@{/data/ballot-templates}"
         sec:authorize="hasAnyRole('ADMIN','DATA_ENTRY')">Design Templates</a>
      <a th:href="@{/print}"
         sec:authorize="hasAnyRole('ADMIN','PRINTER')">Print Ballot</a>
    </span>

    <span class="nav-group" sec:authorize="hasRole('ADMIN')">
      <span class="nav-label">Admin</span>
      <a th:href="@{/admin/jurisdictions}">Jurisdictions</a>
      <a th:href="@{/admin}">Users &amp; Logs</a>
    </span>

    <span class="nav-user">
      <span sec:authentication="name"></span>
      &nbsp;|&nbsp;
      <a th:href="@{/account/password}" style="color:inherit">Change Password</a>
      &nbsp;|&nbsp;
      <form method="post" th:action="@{/logout}" style="display:inline;margin:0;padding:0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit"
                style="background:none;border:none;color:inherit;cursor:pointer;
                       font:inherit;padding:0;text-decoration:underline">
          Logout
        </button>
      </form>
    </span>
  </div>
</nav>
<script>
/*
 * Unsaved-changes warning.
 * Marks any <form class="data-form"> as dirty when a field changes.
 * Shows a browser confirmation if the user tries to navigate away with unsaved changes.
 * Cleared when the form is submitted.
 *
 * Copyright (C) 2026 Mitch Trachtenberg — GPL v3
 */
(function () {
  var dirty = false;

  function markDirty() {
    dirty = true;
    document.querySelectorAll('button[type="submit"]').forEach(function (btn) {
      if (!btn.dataset.originalText) btn.dataset.originalText = btn.textContent;
      if (!btn.textContent.includes('*'))
        btn.textContent = '* ' + btn.dataset.originalText + ' (unsaved)';
    });
  }

  function clearDirty() {
    dirty = false;
    document.querySelectorAll('button[type="submit"]').forEach(function (btn) {
      if (btn.dataset.originalText) btn.textContent = btn.dataset.originalText;
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('form.data-form').forEach(function (form) {
      // Listen for any change inside the form
      form.addEventListener('input',  markDirty);
      form.addEventListener('change', markDirty);
      // Clear dirty state on submit
      form.addEventListener('submit', clearDirty);
    });
  });

  window.addEventListener('beforeunload', function (e) {
    if (dirty) {
      e.preventDefault();
      e.returnValue = 'You have unsaved changes. Leave anyway?';
      return e.returnValue;
    }
  });
})();
</script>
</body>
</html>
