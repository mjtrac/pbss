<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Page Not Found')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main>
  <div class="error-box">
    <h2 th:text="${status} + ' — ' + ${error}">Error</h2>
    <p>The page you're looking for doesn't exist — double-check the URL.</p>
    <p style="color:#666;font-size:.85rem">
      Requested: <code th:text="${path}"></code>
    </p>
    <a th:href="@{/dashboard}" class="btn">Go to Dashboard</a>
  </div>
</main>
</body>
</html>
