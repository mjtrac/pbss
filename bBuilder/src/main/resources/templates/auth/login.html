<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}"></head>
<body>
<div class="login-wrapper">
  <div th:if="${loginLogo != null and !loginLogo.isEmpty()}" style="text-align:center;margin-bottom:1rem">
    <img th:src="${loginLogo}" alt="Logo" style="max-height:80px;max-width:200px">
  </div>
  <h1 th:text="${loginTitle ?: 'pbss Ballot Builder'}">pbss Ballot Builder</h1>
  <form method="post" th:action="@{/login}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>
    <label>Username<input type="text"     name="username" autofocus required/></label>
    <label>Password<input type="password" name="password"          required/></label>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
