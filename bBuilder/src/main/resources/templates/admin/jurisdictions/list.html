<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Jurisdictions')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main>
  <div class="page-header">
    <h2>Jurisdictions</h2>
    <a th:href="@{/admin/jurisdictions/new}" class="btn">+ New Jurisdiction</a>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Contact Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="j : ${jurisdictions}">
        <td th:text="${j.name}"></td>
        <td th:text="${j.address}"></td>
        <td th:text="${j.contactEmail}"></td>
        <td class="actions">
          <a th:href="@{'/admin/jurisdictions/' + ${j.id} + '/edit'}" class="btn btn-sm">Edit</a>
          <form method="post"
                th:action="@{'/admin/jurisdictions/' + ${j.id} + '/delete'}"
                style="display:inline"
                onsubmit="return confirm('Delete jurisdiction &quot;' + [[${j.name}]] + '&quot;? This cannot be undone.')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(jurisdictions)}">
        <td colspan="4" class="empty">No jurisdictions yet. Create one to get started.</td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
