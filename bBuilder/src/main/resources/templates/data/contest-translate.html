<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Translate Contest')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main>
  <h1>Translate Contest</h1>
  <h2 th:text="${contest.title}" style="color:#444;font-weight:normal"></h2>
  <p class="help-text">
    Leave any field blank to use the default English text.
    Only non-blank translations override the original.
  </p>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

  <div th:if="${languages == null or languages.isEmpty()}"
       class="alert alert-info">
    No additional languages are configured for this jurisdiction.
    Add languages under Setup → Languages first.
  </div>

  <form method="post"
        th:action="@{/data/contests/{id}/translate(id=${contest.id})}"
        th:if="${languages != null and !languages.isEmpty()}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div th:each="lang : ${languages}" style="margin-bottom:2rem;padding:1rem;
         border:1px solid #ddd;border-radius:6px">
      <h3 th:text="${lang.languageName + ' (' + lang.languageCode + ')'}"></h3>

      <div class="form-group">
        <label>Contest Title</label>
        <input type="text" th:name="'title_' + ${lang.languageCode}"
               th:value="${translations.?[languageCode == '__${lang.languageCode}__'].^[true]?.title}"
               th:placeholder="${contest.title}"
               style="width:100%"/>
      </div>
      <div class="form-group">
        <label>Voting Instructions <span class="help-text">(blank = auto-generated)</span></label>
        <textarea th:name="'instructions_' + ${lang.languageCode}"
                  th:placeholder="${'Auto: ' + contest.votingMethod}"
                  rows="2" style="width:100%"
                  th:text="${translations.?[languageCode == '__${lang.languageCode}__'].^[true]?.instructions}"></textarea>
      </div>
      <div class="form-group" th:if="${contest.printPreamble}">
        <label>Preamble</label>
        <textarea th:name="'preamble_' + ${lang.languageCode}"
                  rows="2" style="width:100%"
                  th:text="${translations.?[languageCode == '__${lang.languageCode}__'].^[true]?.preamble}"></textarea>
      </div>
      <div class="form-group" th:if="${contest.printPostamble}">
        <label>Postamble</label>
        <textarea th:name="'postamble_' + ${lang.languageCode}"
                  rows="2" style="width:100%"
                  th:text="${translations.?[languageCode == '__${lang.languageCode}__'].^[true]?.postamble}"></textarea>
      </div>
    </div>

    <button type="submit" class="btn">Save Translations</button>
    <a th:href="@{/data/contests}" class="btn btn-secondary" style="margin-left:1rem">
      Back to Contests
    </a>
  </form>
</main>
</body>
</html>
