<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Parties')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main>
  <div class="page-header">
    <h2>Parties</h2>
    <a th:href="@{/data/parties/new}" class="btn">+ New Party</a>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

  <table>
    <thead>
      <tr><th>Name</th><th>Abbreviation</th><th>Jurisdiction</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr th:each="p : ${parties}">
        <td th:text="${p.name}"></td>
        <td th:text="${p.abbreviation}"></td>
        <td th:text="${p.jurisdiction.name}"></td>
        <td class="actions">
          <a th:href="@{'/data/parties/' + ${p.id} + '/edit'}" class="btn btn-sm">Edit</a>
          <form method="post"
                th:action="@{'/data/parties/' + ${p.id} + '/delete'}"
                style="display:inline"
                onsubmit="return confirm('Delete party &quot;' + [[${p.name}]] + '&quot;?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(parties)}">
        <td colspan="4" class="empty">No parties yet.</td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
