<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${formTitle})}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main>
  <h2 th:text="${formTitle}">Party</h2>

  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <form method="post" th:action="@{/data/parties/save}" class="data-form">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="id" th:if="${party.id != null}" th:value="${party.id}"/>

    <label>Party Name *
      <input type="text" name="name" th:value="${party.name}"
             required maxlength="200" autofocus
             placeholder="e.g. Democratic, Republican, Green, Nonpartisan"/>
    </label>

    <label>Jurisdiction *
      <select name="jurisdictionId" required>
        <option value="">-- select jurisdiction --</option>
        <option th:each="j : ${jurisdictions}"
                th:value="${j.id}" th:text="${j.name}"
                th:selected="${party.jurisdiction != null
                              and party.jurisdiction.id == j.id}">
        </option>
      </select>
    </label>

    <label>Abbreviation
      <input type="text" name="abbreviation" th:value="${party.abbreviation}"
             maxlength="20" placeholder="e.g. DEM, REP, GRN"/>
    </label>

    <div class="form-actions">
      <button type="submit" class="btn">Save Party</button>
      <a th:href="@{/data/parties}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</main>
</body>
</html>
