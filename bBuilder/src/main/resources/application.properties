# Default profile = SQLite. Override with -Dspring.profiles.active=postgres
spring.profiles.active=sqlite

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Session security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Set to true when running behind HTTPS in production
server.servlet.session.cookie.secure=false

# Hide stack traces from error responses
server.error.include-stacktrace=never
server.error.include-message=never

# Distinct session cookie so multiple apps can run in the same browser
server.servlet.session.cookie.name=BBUILDER_SESSION

# ── Data directories ──────────────────────────────────────────────────────────
# All persistent bBuilder data lives under bBuilder_data in the user home.
# Subdirectories are created automatically on first use.
data.dir=${user.home}/pbss_data
data.db.dir=${data.dir}/db
data.ballot.templates.dir=${data.dir}/ballot_templates
data.logs.dir=${data.dir}/logs

# ── Export format ─────────────────────────────────────────────────────────────
# Controls which indicator layout file format is written alongside the PDF.
# Options: yaml (default), xml, both
# bCounter reads this to know which format to expect; defaults to yaml if absent.
# ── Ballot output directory ──────────────────────────────────────────────────
# PDF and YAML files are written here after each Print.
ballot.export.dir=${data.ballot.templates.dir}
logging.file.name=${user.home}/pbss_data/logs/bBuilder.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %-5level %logger{36} : %msg%n
ballot.export.format=yaml

# ── Port ──────────────────────────────────────────────────────────────────────
server.port=8080

# ── App background color (any CSS color value) ────────────────────────────────
# Overrides the body background color set in main.css.
# Example: app.background-color=#f0f4f8
#app.background-color=

# ── Login page customisation ──────────────────────────────────────────────────
# Text shown as the heading on the login page.
app.login-title=pbss Ballot Builder
# Optional path to a logo image to show above the heading.
# Must be accessible as a static resource (e.g. placed in src/main/resources/static/).
# Example: app.login-logo=/images/jurisdiction-logo.png
app.login-logo=/images/ballotbox.png
