# SQLite profile — local file database, no setup required
spring.datasource.url=jdbc:sqlite:election_ballot.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# ddl-auto=create-drop recreates the schema on every startup.
# Switch to "update" once you have real data you want to keep.
# NOTE: if upgrading from an older version of this app, DELETE election_ballot.db
# before starting so Hibernate creates fresh tables with the new schema (regions
# instead of sub_jurisdictions, etc.).
spring.jpa.hibernate.ddl-auto=create-drop
