# Test configuration — uses in-memory H2 so no sqlite file is needed
# Copyright (C) 2026 Mitch Trachtenberg

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Suppress Hibernate schema warnings in test output
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN

# Test-only credentials — used by DataInitializer when seeding the test DB.
# These are in src/test/resources so they are NOT included in the production JAR.
# Changing the production admin password does not affect these tests.
test.admin.password=TestAdmin#2026!
