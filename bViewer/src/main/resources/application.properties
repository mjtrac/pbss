spring.application.name=bViewer
server.port=8082
spring.thymeleaf.cache=false

# Points at the counter's SQLite database (read-only)
# Adjust path to match where bCounter writes counter_results.db
# Default: looks for counter_results.db in the bCounter folder
# alongside the bViewer folder (i.e. /path/to/bSuite/bCounter/).
# Override at runtime:
#   ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments="-Dspring.datasource.url=jdbc:sqlite:/full/path/counter_results.db"
# Or set the COUNTER_DB environment variable.
spring.datasource.url=jdbc:sqlite:${COUNTER_DB:${user.dir}/../bCounter/counter_results.db}?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Override db path: java -jar bViewer.jar --counter.db=/full/path/to/counter_results.db

# Distinct session cookie so multiple apps can run in the same browser
server.servlet.session.cookie.name=BVIEWER_SESSION

# ── App background color (any CSS color value) ────────────────────────────────
#app.background-color=

# ── Logging to file ───────────────────────────────────────────────────────────
logging.file.name=${user.dir}/bViewer.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %-5level %logger{36} : %msg%n
