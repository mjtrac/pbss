spring.application.name=viewer

# ── Database (SQLite) ───────────────────────────────────────────────────────
# Same counter_results.db bCounter/blCounter write to — viewer only reads
# it (see hibernate.ddl-auto below), so it's safe to run alongside them.
spring.datasource.url=jdbc:sqlite:${user.home}/pbss_data/db/counter_results.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# none (not update/create/validate): viewer never owns this schema —
# bCounter creates it. "validate" was tried first but SQLite reports
# INTEGER PRIMARY KEY columns as Types#INTEGER rather than Types#BIGINT,
# which makes Hibernate's strict validator fail on every Long-mapped id
# column even though the mapping is identical to bCounter's own (which
# uses ddl-auto=update, which doesn't do this check). "none" means zero
# schema-touching behavior — the strongest guarantee against accidental
# writes, at the cost of a less immediate error if the DB is genuinely
# missing/wrong (surfaces at query time instead of startup).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Logging to file ──────────────────────────────────────────────────────────
logging.file.name=${user.home}/pbss_data/logs/viewer.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %-5level %logger{36} : %msg%n

# ── Login page customisation ─────────────────────────────────────────────────
app.login-title=pbss Ballot Viewer
