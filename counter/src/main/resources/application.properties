spring.application.name=counter

# ── Database (SQLite) ───────────────────────────────────────────────────────
# Same counter_results.db bCounter/blCounter use — update (not none/validate)
# since, like them, this app is a legitimate writer/owner of this schema and
# may be the first thing to ever run against a brand-new pbss_data directory.
spring.datasource.url=jdbc:sqlite:${user.home}/pbss_data/db/counter_results.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Corner detection testing ──────────────────────────────────────────────────
corner.detection.force-bottom-edge-fallback=false

# ── Scanning safety limit ─────────────────────────────────────────────────────
# Stop scanning automatically after this many ballots are sent to manual
# review, so a systematic problem (wrong layout folder, bad images) doesn't
# silently skip large numbers of ballots undetected. 0 disables the limit.
scanner.max-review-before-stop=20

# Number of ballot images to scan in parallel. 0 = auto (half of available CPU cores).
scanner.parallel-threads=0

# ── Indicator layout format ───────────────────────────────────────────────────
# Which ballot layout file format counter expects alongside each PDF/image
# set: yaml (default) or xml. Falls back to the other if the preferred one
# isn't found.
ballot.layout.format=yaml

# ── Logging to file ──────────────────────────────────────────────────────────
logging.file.name=${user.home}/pbss_data/logs/counter.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %-5level %logger{36} : %msg%n

# ── Data directories ────────────────────────────────────────────────────────
# All persistent data lives under pbss_data in the user home — same layout
# bBuilder/bCounter/blBuilder/blCounter use, so folders line up automatically.
data.dir=${user.home}/pbss_data
data.ballot.templates.dir=${data.dir}/ballot_templates
data.scans.dir=${data.dir}/cast_ballot_scans
data.reports.dir=${data.dir}/reports
data.writeins.dir=${data.dir}/writeins
data.scribbles.dir=${data.dir}/scribbles
reports.output.dir=${data.reports.dir}

# Pre-populated defaults for the two folder fields in the UI.
scanner.default.image.dir=${data.scans.dir}
scanner.default.report.dir=${data.ballot.templates.dir}

# How often (in images scanned) to write results_report.html during a scan.
# Also always written at the end of a scan.
reports.interval=500

# Use per-indicator patch warping instead of full-image warp (not faster in testing).
scanner.patch-warp=false

# Flag ink outside indicator zones (margin notes, arrows, etc.) via inter-ballot
# comparison; see ScribbleDetectionService for the algorithm.
scanner.scribble-detection=true

# Padding around each indicator's bounding box (inches) that's exempt from
# scribble detection, so a slightly-overflowing fill isn't flagged as stray ink.
scanner.scribble-indicator-pad-in=0.1
scanner.scribble-outline-dir=${data.scribbles.dir}

# ── Fixed scan parameters (not exposed in the UI — this app deliberately
#    only exposes the two folder fields; tune these here if needed) ──────────
counter.threshold=128
counter.dark-pct-min=8.0
counter.dpi=200
counter.assumed-paper-width-in=8.5
