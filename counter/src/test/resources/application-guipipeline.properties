# Activated by CountingPipelineGuiTest via .profiles("guipipeline"). Same
# reasoning as blCounter's identically-named file: SpringApplicationBuilder's
# .properties(...) sets Spring Boot's lowest-precedence "default properties",
# which lose to this module's own src/main/resources/application.properties
# (there's no test/resources/application.properties here to lose to instead,
# but the main one still wins over defaultProperties). A profile-specific
# file, activated explicitly, correctly overrides it.
#
# gui.pipeline.resultsDir is supplied by the test itself via .properties(...)
# — safe there since nothing else defines that key.

spring.datasource.url=jdbc:sqlite:${gui.pipeline.resultsDir}/counter_results.db
spring.jpa.hibernate.ddl-auto=update
reports.output.dir=${gui.pipeline.resultsDir}
scanner.scribble-outline-dir=${gui.pipeline.resultsDir}/scribbles
scanner.max-review-before-stop=0

# Matches the DPI the shared test-harness/desktop_pipeline image corpus was
# rasterized at (150 DPI — see feedback in blCounter's equivalent test:
# 300 DPI real full-page ballots make a few-hundred-image scan slow with no
# added test value). This app has no DPI UI control — it's fixed here.
counter.dpi=150
