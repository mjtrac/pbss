spring.application.name=scanner

# ── Database (SQLite) ───────────────────────────────────────────────────────
# Same scanner.db bScanner/blScanner use. This app has no login (no
# ScannerUser queries of its own), but scanner-core's @EnableJpaRepositories
# still needs a working datasource to start.
spring.datasource.url=jdbc:sqlite:${user.home}/pbss_data/db/scanner.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Logging to file ──────────────────────────────────────────────────────────
logging.file.name=${user.home}/pbss_data/logs/scanner.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %-5level %logger{36} : %msg%n

# ── Scanner backend + output (same properties bScanner/blScanner use) ───────
scanner.backend=naps2
scanner.naps2.path=/Applications/NAPS2.app/Contents/MacOS/naps2
scanner.scanimage.path=/usr/bin/scanimage
scanner.output.dir=${user.home}/pbss_data/cast_ballot_scans
scanner.dpi=300
scanner.duplex=true
scanner.source=feeder
scanner.filename.prefix=ballot_scan_
# Defaults to scanner.output.dir if left blank.
scanner.batch-log.dir=

# ── Optional flag-page printing for start/end notes ──────────────────────────
# Off by default — a printing failure never stops scanning either way
# (see FlagPagePrinter in scanner-core). Set printer-name to a specific
# printer (as listed by the OS); leave blank to use the system default.
scanner.notes.print-flag-pages=false
scanner.notes.printer-name=
