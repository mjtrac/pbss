spring.application.name=builder

# ── Database (SQLite) ───────────────────────────────────────────────────────
# Same election_ballot.db bBuilder/blBuilder use.
spring.datasource.url=jdbc:sqlite:${user.home}/pbss_data/db/election_ballot.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Logging to file ──────────────────────────────────────────────────────────
logging.file.name=${user.home}/pbss_data/logs/builder.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %-5level %logger{36} : %msg%n

# ── Data directories (same layout bBuilder/blBuilder use) ───────────────────
data.dir=${user.home}/pbss_data
data.ballot.templates.dir=${data.dir}/ballot_templates
ballot.export.dir=${data.ballot.templates.dir}
ballot.export.format=yaml
